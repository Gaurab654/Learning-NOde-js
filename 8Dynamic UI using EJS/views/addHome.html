<!DOCTYPE html>
<html>
<head>
  <title>Register Home</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f2f2f2; display: flex; justify-content: center; align-items: center; height: 100vh;">
  <form action="/host/add-home" method="POST" 
 style="background: white; padding: 25px; border-radius: 10px; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
<h2 style="text-align: center; margin-bottom: 20px; color: #333;">
  Register Your Home
</h2>

<label style="font-weight: bold;">  register your house here</label>
<input type="text" name="houseName" 
       style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;"
       placeholder="Enter house name" required>

<button type="submit" 
        style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">
  Submit
</button>


  </form>

</body>
</html>
