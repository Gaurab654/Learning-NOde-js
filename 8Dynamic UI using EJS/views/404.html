<!DOCTYPE html>
<html>
<head>
  <title>404 Not Found</title>
</head>

<body style="
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff4e50, #f9d423);
">

  <div style="
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  ">

    <h1 style="
      font-size: 60px;
      margin: 0;
      color: #ff4e50;
    ">
      404
    </h1>

    <h2 style="
      margin: 10px 0;
      color: #333;
    ">
      Page Not Found
    </h2>

    <p style="
      color: #666;
      margin-bottom: 20px;
    ">
      The page you are looking for does not exist.
    </p>

    <a href="/" style="
      display: inline-block;
      padding: 10px 20px;
      background: #ff4e50;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    ">
      Go Home
    </a>

  </div>

</body>
</html>
